<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNet Studio</title>

    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>
    <style>
        .start-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 100vh;
            background: var(--gradient);
        }
        .start-section > h1 {
            color: var(--white);
            font-size: 80px;
            text-align: center;
        }
        .start-section .promo {
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: var(--radius);
            background: var(--halfWhite);
            width: 90vw;
            min-height: 150px;
        }
        .start-section .promo p {
            color: var(--white);
            font-size: 1.5rem;
            max-width: 50%;
        }
        button {
            background: var(--yellow);
            border-radius: var(--halfRadius);
            color: var(--black);
            border: none;
            padding: 5px 30px;
            font-size: 1.2rem;
        }
        button:hover {
            box-shadow: 0 0 10px var(--yellow);
            color: var(--white);
        }
    </style>
    <div class="start-section">

        <h1>This is test message!</h1>

        <div class="promo">
            <p>This is test message! This is test message! This is test message!</p>
            <button>Консультация</button>
        </div>

    </div>

    <pre>

















    </pre>

    <script src="./public/js/main.js"></script>
    <script src="./public/js/cursor.js"></script>
</body>
</html>
