<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="WebNet smart internet">
	<link rel="icon" type="image/png" href="./public/img/logo.png">
	<link rel="manifest" href="./manifest.json">
	<meta name="#000">

    <title>WebNet</title>

    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>
    <div class="logo" style="background-image: url(./public/img/logo.png); background-size: 50%;"></div>

	<section class="layers">
		<div class="layers__container">
			<div class="layers__item layer-1" style="background-image: url(./public/img/layer-1.jpg);"></div>
			<div class="layers__item layer-2" style="background-image: url(./public/img/layer-2.png);"></div>
			<div class="layers__item layer-3">
				<div class="hero-content">
					<h1>Ваше воображение <span>цифровое воплощение!</span></h1>
					<div class="hero-content__p">WEB, IOS, MacOS, Android, Windows, Linux</div>
					<button class="button-start">Заказать звонок</button>
				</div>
			</div>
			<div class="layers__item layer-4">
				<canvas class="rain"></canvas>
			</div>
			<div class="layers__item layer-5" style="background-image: url(./public/img/layer-5.png);"></div>
			<div class="layers__item layer-6" style="background-image: url(./public/img/layer-6.png);"></div>
		</div>
	</section>



    <div class="second-section">

        <h1>Высокое качество цифровых продуктов</h1>

        <div class="promo">
            <p>Прохождение всех тестов от <b>GOOGLE Lighthouse!</b></p>
            <button>Подробнее</button>
        </div>

    </div>




    <script src="./public/js/cursor.js" defer></script>
    <script src="./public/js/main.js" defer></script>
    <script src="./public/js/3d.js" defer></script>
	<script src="./public/js/rain.js" defer></script>

	<script>
		if('serviceWorker' in navigator)
		{
			window.addEventListener('load', function()
			{
				navigator.serviceWorker.register('/sw.js').then(function(registration)
				{
				// Registration was successful
				console.log('ServiceWorker registration successful with scope: ', registration.scope);
				}, function(err)
				{
					// registration failed :(
					console.log('ServiceWorker registration failed: ', err);
				});
			});
		}

	</script>
</body>
</html>
